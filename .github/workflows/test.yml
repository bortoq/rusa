name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends ffmpeg

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts tqdm langdetect pytest fastapi uvicorn python-multipart
          # httpx2 required by newer starlette.testclient (only on Python >=3.10)
          python -c "import sys; sys.exit(0 if sys.version_info >= (3,10) else 1)" && pip install httpx2 || true

      - name: Run tests (offline)
        run: pytest -q -m 'not slow and not live_tts'
