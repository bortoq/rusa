name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  offline-tests:
    name: offline tests (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install ffmpeg
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends ffmpeg

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest

      - name: Compile all Python files
        run: python -m compileall -q .

      - name: Run offline tests
        run: pytest -q -m 'not slow and not live_tts'

  smoke-matrix:
    name: cli smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and pytest
        run: |
          python -m pip install --upgrade pip
          pip install . pytest

      - name: Compile all Python files
        run: python -m compileall -q .

      - name: Run CLI smoke tests
        run: pytest -q tests/test_cli_smoke.py

  build-package:
    name: build package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install built wheel
        run: pip install dist/*.whl

      - name: Smoke check installed CLI
        run: |
          rusa --version
          rusa --help
          rusa --doctor || true

  lint:
    name: lightweight lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run lightweight lint
        run: ruff check . --select E9,F63,F7,F82

  docker-smoke:
    name: docker smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t rusa:test .

      - name: Smoke check Docker CLI
        run: |
          docker run --rm rusa:test --version
          docker run --rm rusa:test --help

  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - offline-tests
      - smoke-matrix
      - build-package
      - lint
      - docker-smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
