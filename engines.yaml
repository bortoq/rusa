# ─── Built-in declarative TTS engines for rusa ──────────────────────────────
#
# Users can override or add engines in ~/.config/rusa/engines.yaml
# Full reference: doc/TTS_ENGINES.md
#
# Each engine needs:
#   binary        — executable in PATH
#   output_format — wav or mp3
#   generate_cmd  — template with {in} {out} {voice}
#   voice_parser  — how to parse voice list (static, espeak, one_per_line)
#
# For custom TTS not listed here, use --tts-cmd (see README.md)

engines:

  # ── Piper ─────────────────────────────────────────────────────────────
  # Fast local neural TTS. Models: https://github.com/rhasspy/piper
  piper:
    display_name: piper
    binary: piper
    output_format: wav
    default_voice: ru_RU-dmitri-medium
    static_voices:
      - ru_RU-dmitri-medium
      - ru_RU-irina-medium
      - en_US-lessac-medium
      - en_US-ryan-medium
      - de_DE-thorsten-medium
      - fr_FR-siwis-medium
    generate_cmd: "piper --model {voice} --output_file {out} --json-input < {in}"
    voice_parser: static

  # ── RHVoice ────────────────────────────────────────────────────────────
  # Lightweight local TTS for Russian, Ukrainian, etc.
  rhvoice:
    display_name: rhvoice
    binary: RHVoice-test
    output_format: wav
    default_voice: elena
    static_voices:
      - elena
      - anna
      - aleksandr
    generate_cmd: "RHVoice-test -p {voice} -i {in} -o {out}"
    voice_parser: static

  # ── eSpeak-NG ──────────────────────────────────────────────────────────
  # Ultra-fast, low-quality, many languages.
  espeak:
    display_name: espeak
    binary: espeak-ng
    output_format: wav
    default_voice: ru
    list_voices_cmd: "espeak-ng --voices"
    generate_cmd: "espeak-ng -v {voice} -f {in} -w {out}"
    voice_parser: espeak

  # ── Google TTS (gTTS) ─────────────────────────────────────────────────
  # Cloud TTS, requires internet.
  gtts:
    display_name: gtts
    binary: gtts-cli
    output_format: mp3
    default_voice: ru
    static_voices:
      - ru
      - en
      - de
      - fr
      - es
      - it
    generate_cmd: "gtts-cli --lang {voice} -f {in} -o {out}"
    voice_parser: static

  # ── Festival ───────────────────────────────────────────────────────────
  # Classic Edinburgh TTS. Very old but works offline.
  festival:
    display_name: festival
    binary: text2wave
    output_format: wav
    default_voice: default
    static_voices:
      - default
    generate_cmd: "text2wave -o {out} {in}"
    voice_parser: static
